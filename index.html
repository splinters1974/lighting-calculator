<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighting Retrofit Calculator — Kinetic Energy Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --kec-dark: #0f1923;
            --kec-mid: #1e2d3d;
            --kec-accent: #e8a838;
            --kec-accent-light: #f5c96a;
            --kec-green: #2dd4a0;
            --kec-subtle: #8fa3b8;
            --kec-border: rgba(255,255,255,0.08);
            --kec-card: rgba(255,255,255,0.04);
        }
        * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--kec-dark); color: #e8edf2; min-height: 100vh; }
        .display-font { font-family: 'Playfair Display', serif; }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,168,56,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(45,212,160,0.05) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        #app { position: relative; z-index: 1; }
        .progress-track { background: rgba(255,255,255,0.08); height: 2px; border-radius: 2px; }
        .progress-fill { background: linear-gradient(90deg, var(--kec-accent), var(--kec-accent-light)); height: 2px; border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
        .card { background: var(--kec-card); border: 1px solid var(--kec-border); border-radius: 12px; backdrop-filter: blur(8px); }
        .card-accent { background: rgba(232,168,56,0.07); border: 1px solid rgba(232,168,56,0.25); border-radius: 12px; }
        .card-green { background: rgba(45,212,160,0.07); border: 1px solid rgba(45,212,160,0.25); border-radius: 12px; }
        .card-recommended { background: rgba(232,168,56,0.05); border: 2px solid rgba(232,168,56,0.5); border-radius: 12px; position: relative; }
        .field {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; color: #e8edf2; padding: 12px 16px; width: 100%;
            font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s; font-family: 'DM Sans', sans-serif;
        }
        .field:focus { outline: none; border-color: rgba(232,168,56,0.6); box-shadow: 0 0 0 3px rgba(232,168,56,0.1); }
        .field option { background: #1e2d3d; color: #e8edf2; }
        .btn-primary {
            background: linear-gradient(135deg, var(--kec-accent), var(--kec-accent-light));
            color: var(--kec-dark); border: none; border-radius: 8px; padding: 14px 24px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; font-family: 'DM Sans', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,168,56,0.3); }
        .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(255,255,255,0.07); color: #c5d0db; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 14px 24px; font-size: 15px; font-weight: 500; cursor: pointer;
            transition: background 0.15s; font-family: 'DM Sans', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.11); }
        .btn-toggle {
            background: rgba(255,255,255,0.05); color: #8fa3b8; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 7px; padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.15s; font-family: 'DM Sans', sans-serif;
        }
        .btn-toggle.active { background: rgba(232,168,56,0.15); color: var(--kec-accent); border-color: rgba(232,168,56,0.4); }
        .room-row {
            display: flex; gap: 10px; align-items: center; padding: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px; animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .page-enter { animation: fadeUp 0.4s ease-out; }
        .day-row { padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; display: flex; align-items: center; gap: 12px; }
        .stat-card { padding: 20px 24px; border-radius: 12px; }
        .stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; }
        .stat-sub { font-size: 13px; opacity: 0.55; margin-top: 2px; }
        .finance-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .finance-row:last-child { border-bottom: none; }
        .divider { height: 1px; background: rgba(255,255,255,0.07); }
        .custom-checkbox { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
        .custom-checkbox.checked { background: var(--kec-accent); border-color: var(--kec-accent); }
        .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; background: rgba(232,168,56,0.2); color: var(--kec-accent); }
        .field-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--kec-subtle); margin-bottom: 8px; display: block; }
        .remove-btn { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; padding: 4px; border-radius: 4px; transition: color 0.15s; flex-shrink: 0; }
        .remove-btn:hover { color: #ef4444; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
        .note-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-left: 3px solid rgba(232,168,56,0.4); border-radius: 0 8px 8px 0; padding: 12px 16px; font-size: 13px; color: var(--kec-subtle); line-height: 1.6; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 0.4; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
// ── Constants ────────────────────────────────────────────
const LIGHTING_SPECS = {
    incandescent: { label: 'Incandescent',            wOld: 60, wNew: 9,  desc: '60W → 9W LED equivalent' },
    halogen:      { label: 'Halogen',                 wOld: 50, wNew: 7,  desc: '50W → 7W LED equivalent' },
    fluorescent:  { label: 'Fluorescent / CFL',       wOld: 35, wNew: 18, desc: '35W avg → 18W LED equivalent' },
    olderled:     { label: 'Older LED (8–10 yrs)',     wOld: 12, wNew: 9,  desc: '12W → 9W LED equivalent' },
};

const BUILDING_COSTS = {
    office:     { min: 80,  max: 140, label: 'Office' },
    education:  { min: 90,  max: 160, label: 'Education' },
    healthcare: { min: 100, max: 180, label: 'Healthcare' },
    retail:     { min: 90,  max: 170, label: 'Retail' },
    warehouse:  { min: 140, max: 280, label: 'Warehouse / Industrial' },
    carpark:    { min: 160, max: 320, label: 'Car Park / External' },
};

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// ── State ────────────────────────────────────────────────
const state = {
    step: 'setup',
    buildingType: 'office',
    costOverride: '',
    lightType: 'incandescent',
    electricityRate: '29',
    sensors: false,
    quickMode: false,
    quickRooms: '',
    quickBulbs: '',
    rooms: [],
    hours: {
        Monday:    { on: true,  start: '08:00', end: '18:00' },
        Tuesday:   { on: true,  start: '08:00', end: '18:00' },
        Wednesday: { on: true,  start: '08:00', end: '18:00' },
        Thursday:  { on: true,  start: '08:00', end: '18:00' },
        Friday:    { on: true,  start: '08:00', end: '18:00' },
        Saturday:  { on: false, start: '09:00', end: '13:00' },
        Sunday:    { on: false, start: '09:00', end: '12:00' },
    },
    roiYears: 5,
};

// ── Helpers ──────────────────────────────────────────────
const fmt = (n, decimals = 0) =>
    Number(n).toLocaleString('en-GB', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });

const fmtGBP = (n, decimals = 0) => `£${fmt(n, decimals)}`;

const timeToHours = t => {
    if (!t || !t.includes(':')) return 0;
    const [h, m] = t.split(':').map(Number);
    return h + m / 60;
};

const hoursInRange = (start, end) => Math.max(0, timeToHours(end) - timeToHours(start));

const uid = () => Math.random().toString(36).slice(2);

// ── Derived calculations ─────────────────────────────────
function calc() {
    const bc = BUILDING_COSTS[state.buildingType];
    const defaultCost = (bc.min + bc.max) / 2;
    const costPerFitting = state.costOverride !== '' && !isNaN(parseFloat(state.costOverride))
        ? parseFloat(state.costOverride) : defaultCost;

    const totalBulbs = state.quickMode
        ? (parseInt(state.quickRooms) || 0) * (parseInt(state.quickBulbs) || 0)
        : state.rooms.reduce((s, r) => s + (parseInt(r.bulbs) || 0), 0);

    const annualHours = DAYS.reduce((sum, day) => {
        const d = state.hours[day];
        if (!d.on) return sum;
        return sum + hoursInRange(d.start, d.end) * 52;
    }, 0);

    const weeklyHours = DAYS.reduce((sum, day) => {
        const d = state.hours[day];
        if (!d.on) return sum;
        return sum + hoursInRange(d.start, d.end);
    }, 0);

    const spec = LIGHTING_SPECS[state.lightType];
    const pencePerKwh = parseFloat(state.electricityRate) || 25;
    const sensorFactor = state.sensors ? 0.85 : 1.0;

    const currentKwh = (totalBulbs * spec.wOld * annualHours) / 1000;
    const newKwh     = (totalBulbs * spec.wNew * annualHours * sensorFactor) / 1000;
    const kwhSaving  = currentKwh - newKwh;

    const currentAnnualCost = currentKwh * (pencePerKwh / 100);
    const newAnnualCost     = newKwh     * (pencePerKwh / 100);
    const annualSaving      = currentAnnualCost - newAnnualCost;
    const currentMonthly    = currentAnnualCost / 12;

    const sensorCostPerFitting = state.sensors ? 30 : 0;
    const installCost          = totalBulbs * (costPerFitting + sensorCostPerFitting);
    const overhead             = installCost * 0.08;
    const totalProjectCost     = installCost + overhead;

    // Energy price escalation: 3% per year compounding
    // Cumulative saving = sum of annualSaving * 1.03^(y-1) for y=1..roiYears
    const ESCALATION = 0.03;
    let cumulativeSaving = 0;
    for (let y = 1; y <= state.roiYears; y++) {
        cumulativeSaving += annualSaving * Math.pow(1 + ESCALATION, y - 1);
    }

    // Payback: find the month at which escalating cumulative savings cover project cost
    let paybackMonths = null;
    if (annualSaving > 0) {
        let cumulative = 0;
        for (let m = 1; m <= state.roiYears * 12 + 1; m++) {
            const yearIndex = Math.floor((m - 1) / 12);
            const monthSaving = (annualSaving * Math.pow(1 + ESCALATION, yearIndex)) / 12;
            cumulative += monthSaving;
            if (cumulative >= totalProjectCost) { paybackMonths = m; break; }
        }
        // Fallback to simple estimate if not paid back within roiYears window
        if (!paybackMonths) paybackMonths = totalProjectCost / (annualSaving / 12);
    }
    const paybackDisplay = paybackMonths
        ? `${Math.floor(paybackMonths / 12)}y ${Math.round(paybackMonths % 12)}m` : '—';

    const netBenefit = cumulativeSaving - totalProjectCost;
    const roiPct     = totalProjectCost > 0 ? (netBenefit / totalProjectCost) * 100 : 0;

    const leaseTermMonths    = state.roiYears * 12;
    const leaseMonthly       = totalProjectCost / leaseTermMonths;
    // Lease monthly saving uses year-1 saving as baseline (conservative)
    const leaseMonthlySaving = annualSaving / 12 - leaseMonthly;

    const eaasMonthly       = currentMonthly * 0.75;
    const eaasMonthlySaving = currentMonthly - eaasMonthly;

    return {
        defaultCost, costPerFitting, totalBulbs, annualHours, weeklyHours,
        spec, pencePerKwh,
        currentKwh, newKwh, kwhSaving,
        currentAnnualCost, newAnnualCost, annualSaving, currentMonthly,
        totalProjectCost, paybackMonths, paybackDisplay,
        netBenefit, roiPct,
        leaseMonthly, leaseMonthlySaving,
        eaasMonthly, eaasMonthlySaving,
    };
}

// ── SVG Icons ────────────────────────────────────────────
const icons = {
    chevronRight: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`,
    chevronLeft:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>`,
    plus:         `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    x:            `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
    check:        `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`,
    refresh:      `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.6"/></svg>`,
};

// ── Header snippet ───────────────────────────────────────
function headerHTML(subtitle, stepNum) {
    const steps = [
        { n: 1, label: '1 · Setup' },
        { n: 2, label: '2 · Hours' },
        { n: 3, label: '3 · Results' },
    ];
    const progressPct = (stepNum / 3) * 100;
    const stepsHTML = steps.map(s =>
        `<span style="color:${s.n === stepNum ? 'var(--kec-accent)' : 'var(--kec-subtle)'}; font-weight:${s.n === stepNum ? 600 : 400};">${s.label}</span>`
    ).join('');
    return `
        <div style="margin-bottom:40px;">
            <div style="color:var(--kec-accent);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">Kinetic Energy Consulting</div>
            <h1 class="display-font" style="font-size:2.5rem;font-weight:700;line-height:1.1;margin-bottom:8px;">${subtitle}</h1>
            <p style="color:var(--kec-subtle);font-size:15px;">Estimate savings and compare finance options in under two minutes.</p>
        </div>
        <div class="progress-track" style="margin-bottom:8px;"><div class="progress-fill" style="width:${progressPct}%;"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:32px;">${stepsHTML}</div>
    `;
}

// ── Render: Setup ────────────────────────────────────────
function renderSetup() {
    const c = calc();
    const bc = BUILDING_COSTS[state.buildingType];

    const buildingOptions = Object.entries(BUILDING_COSTS).map(([k, v]) =>
        `<option value="${k}" ${state.buildingType === k ? 'selected' : ''}>${v.label}</option>`
    ).join('');

    const lightOptions = Object.entries(LIGHTING_SPECS).map(([k, v]) =>
        `<option value="${k}" ${state.lightType === k ? 'selected' : ''}>${v.label} — ${v.desc}</option>`
    ).join('');

    const roomsHTML = state.rooms.length === 0
        ? `<div style="text-align:center;padding:24px;color:var(--kec-subtle);font-size:14px;border:1px dashed rgba(255,255,255,0.1);border-radius:8px;">No rooms added yet — click "Add Room" above</div>`
        : state.rooms.map((room, i) => `
            <div class="room-row" data-room-id="${room.id}">
                <input type="text" class="field room-name" data-id="${room.id}" placeholder="Room ${i+1} (optional name)" value="${room.name}" style="flex:1;padding:9px 12px;font-size:14px;">
                <input type="number" class="field room-bulbs" data-id="${room.id}" placeholder="Bulbs" value="${room.bulbs}" min="1" style="width:80px;padding:9px 12px;font-size:14px;text-align:center;">
                <span style="font-size:13px;color:var(--kec-subtle);white-space:nowrap;">bulbs</span>
                <button class="remove-btn remove-room" data-id="${room.id}">${icons.x}</button>
            </div>
        `).join('');

    const summaryPill = c.totalBulbs > 0 ? `
        <div class="card-accent" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:14px;font-weight:600;color:var(--kec-accent);">${fmt(c.totalBulbs)} fittings</span>
            <span style="font-size:13px;color:rgba(232,168,56,0.7);">${fmtGBP(c.costPerFitting)} / fitting${state.sensors ? ' + sensors' : ''}</span>
        </div>` : '';

    return `
    <div class="max-w-xl mx-auto px-5 py-10 page-enter" style="max-width:560px;margin:0 auto;padding:40px 20px;">
        ${headerHTML('Lighting Retrofit<br>Calculator', 1)}
        <div style="display:flex;flex-direction:column;gap:24px;">

            <div>
                <label class="field-label">Building Type</label>
                <select class="field" id="buildingType">${buildingOptions}</select>
                <div style="font-size:12px;color:var(--kec-subtle);margin-top:6px;">
                    Default: ${fmtGBP(bc.min)}–${fmtGBP(bc.max)} per fitting (all-in installed)
                </div>
            </div>

            <div>
                <label class="field-label">Cost Per Fitting — Override (optional)</label>
                <div style="display:flex;gap:10px;align-items:center;">
                    <input type="number" class="field" id="costOverride" value="${state.costOverride}" placeholder="${Math.round(c.defaultCost)}" min="1">
                    <span style="color:var(--kec-subtle);white-space:nowrap;font-size:14px;">£ / fitting</span>
                </div>
                <div style="font-size:12px;color:var(--kec-subtle);margin-top:6px;">Leave blank to use the building type default</div>
            </div>

            <div>
                <label class="field-label">Current Lighting Type</label>
                <select class="field" id="lightType">${lightOptions}</select>
            </div>

            <div>
                <label class="field-label">Electricity Rate</label>
                <div style="display:flex;gap:10px;align-items:center;">
                    <input type="number" class="field" id="electricityRate" value="${state.electricityRate}" min="1" step="0.5">
                    <span style="color:var(--kec-subtle);white-space:nowrap;font-size:14px;">p / kWh</span>
                </div>
            </div>

            <div>
                <div style="display:flex;align-items:center;gap:12px;cursor:pointer;" id="sensorsToggle">
                    <div class="custom-checkbox ${state.sensors ? 'checked' : ''}" id="sensorsCheckbox">
                        ${state.sensors ? icons.check : ''}
                    </div>
                    <div>
                        <div style="font-weight:500;font-size:15px;">Add presence / daylight sensors</div>
                        <div style="font-size:13px;color:var(--kec-subtle);margin-top:2px;">Estimated ~15% additional reduction in running hours. Adds ~£30/fitting to install cost.</div>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <div>
                <label class="field-label">Room Entry Mode</label>
                <div style="display:flex;gap:8px;">
                    <button class="btn-toggle ${!state.quickMode ? 'active' : ''}" id="modeDetailed" style="flex:1;">Detailed Rooms</button>
                    <button class="btn-toggle ${state.quickMode ? 'active' : ''}" id="modeQuick" style="flex:1;">Quick Entry</button>
                </div>
            </div>

            ${!state.quickMode ? `
            <div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <span style="font-weight:600;font-size:15px;">Rooms</span>
                    <button id="addRoom" style="display:flex;align-items:center;gap:6px;background:rgba(232,168,56,0.12);color:var(--kec-accent);border:1px solid rgba(232,168,56,0.3);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">
                        ${icons.plus} Add Room
                    </button>
                </div>
                <div id="roomsList" style="display:flex;flex-direction:column;gap:8px;">${roomsHTML}</div>
            </div>
            ` : `
            <div style="display:flex;gap:12px;">
                <div style="flex:1;">
                    <label class="field-label">Number of Rooms</label>
                    <input type="number" class="field" id="quickRooms" value="${state.quickRooms}" placeholder="e.g. 12" min="1">
                </div>
                <div style="flex:1;">
                    <label class="field-label">Avg Bulbs per Room</label>
                    <input type="number" class="field" id="quickBulbs" value="${state.quickBulbs}" placeholder="e.g. 8" min="1">
                </div>
            </div>
            `}

            ${summaryPill}

            <button class="btn-primary" id="nextToHours" style="width:100%;" ${c.totalBulbs === 0 ? 'disabled' : ''}>
                Next: Operating Hours ${icons.chevronRight}
            </button>
        </div>
    </div>`;
}

// ── Render: Hours ────────────────────────────────────────
function renderHours() {
    const c = calc();

    const daysHTML = DAYS.map(day => {
        const d = state.hours[day];
        const timeInputs = d.on ? `
            <div style="display:flex;gap:8px;align-items:center;flex:1;">
                <input type="time" class="field hour-start" data-day="${day}" value="${d.start}" style="flex:1;padding:7px 10px;font-size:14px;">
                <span style="color:var(--kec-subtle);font-size:13px;flex-shrink:0;">to</span>
                <input type="time" class="field hour-end" data-day="${day}" value="${d.end}" style="flex:1;padding:7px 10px;font-size:14px;">
                <span style="color:var(--kec-subtle);font-size:12px;flex-shrink:0;width:32px;text-align:right;">${hoursInRange(d.start, d.end).toFixed(1)}h</span>
            </div>
        ` : `<span style="color:rgba(143,163,184,0.4);font-size:14px;flex:1;margin-left:8px;">Closed</span>`;

        return `
        <div class="day-row">
            <div style="width:95px;font-weight:500;font-size:14px;flex-shrink:0;">${day}</div>
            <button class="btn-toggle day-toggle ${d.on ? 'active' : ''}" data-day="${day}" style="padding:6px 14px;font-size:13px;flex-shrink:0;">
                ${d.on ? 'On' : 'Off'}
            </button>
            ${timeInputs}
        </div>`;
    }).join('');

    return `
    <div class="max-w-xl mx-auto px-5 py-10 page-enter" style="max-width:560px;margin:0 auto;padding:40px 20px;">
        ${headerHTML('Operating<br>Hours', 2)}

        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">${daysHTML}</div>

        <div class="card" style="padding:14px 18px;margin-bottom:24px;display:flex;justify-content:space-between;">
            <div>
                <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--kec-subtle);margin-bottom:4px;">Weekly hours</div>
                <div class="display-font" style="font-size:1.6rem;font-weight:700;">${c.weeklyHours.toFixed(1)}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--kec-subtle);margin-bottom:4px;">Annual hours</div>
                <div class="display-font" style="font-size:1.6rem;font-weight:700;">${fmt(Math.round(c.annualHours))}</div>
            </div>
        </div>

        <div style="margin-bottom:28px;">
            <label class="field-label">Show return on investment over:</label>
            <div style="display:flex;gap:8px;">
                ${[5,7,10].map(y => `
                    <button class="btn-toggle roi-btn ${state.roiYears === y ? 'active' : ''}" data-years="${y}" style="flex:1;padding:10px;">${y} years</button>
                `).join('')}
            </div>
        </div>

        <div style="display:flex;gap:10px;">
            <button class="btn-secondary" id="backToSetup" style="flex:1;">${icons.chevronLeft} Back</button>
            <button class="btn-primary" id="nextToResults" style="flex:2;">See Results ${icons.chevronRight}</button>
        </div>
    </div>`;
}

// ── Render: Results ──────────────────────────────────────
function renderResults() {
    const c = calc();
    const kwhReductionPct = c.currentKwh > 0 ? ((c.kwhSaving / c.currentKwh) * 100) : 0;

    return `
    <div class="max-w-3xl mx-auto px-5 py-10 page-enter" style="max-width:820px;margin:0 auto;padding:40px 20px;">
        <div style="margin-bottom:40px;">
            <div style="color:var(--kec-accent);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">Kinetic Energy Consulting</div>

            <span style="color:var(--kec-subtle);">1 · Setup</span>
            <span style="color:var(--kec-subtle);">2 · Hours</span>
            <span style="color:var(--kec-accent);font-weight:600;">3 · Results</span>
        </div>

        <!-- Energy -->
        <div style="margin-bottom:32px;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--kec-subtle);margin-bottom:14px;">Annual Energy Consumption</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
                <div class="card stat-card">
                    <div class="stat-label">Current</div>
                    <div class="stat-value">${fmt(Math.round(c.currentKwh))}</div>
                    <div class="stat-sub">kWh / year</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">After Retrofit</div>
                    <div class="stat-value">${fmt(Math.round(c.newKwh))}</div>
                    <div class="stat-sub">kWh / year</div>
                </div>
                <div class="card-green stat-card">
                    <div class="stat-label" style="color:var(--kec-green);">Reduction</div>
                    <div class="stat-value" style="color:var(--kec-green);">${fmt(Math.round(kwhReductionPct))}%</div>
                    <div class="stat-sub" style="color:rgba(45,212,160,0.6);">${fmt(Math.round(c.kwhSaving))} kWh saved</div>
                </div>
            </div>
        </div>

        <!-- Cost -->
        <div style="margin-bottom:32px;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--kec-subtle);margin-bottom:14px;">Annual Lighting Cost</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
                <div class="card stat-card">
                    <div class="stat-label">Current</div>
                    <div class="stat-value">${fmtGBP(Math.round(c.currentAnnualCost))}</div>
                    <div class="stat-sub">${fmtGBP(Math.round(c.currentMonthly))} / month</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">After Retrofit</div>
                    <div class="stat-value">${fmtGBP(Math.round(c.newAnnualCost))}</div>
                    <div class="stat-sub">${fmtGBP(Math.round(c.newAnnualCost / 12))} / month</div>
                </div>
                <div class="card-accent stat-card">
                    <div class="stat-label" style="color:var(--kec-accent);">Annual Saving</div>
                    <div class="stat-value" style="color:var(--kec-accent);">${fmtGBP(Math.round(c.annualSaving))}</div>
                    <div class="stat-sub" style="color:rgba(232,168,56,0.6);">${fmtGBP(Math.round(c.annualSaving / 12))} / month</div>
                </div>
            </div>
        </div>

        <!-- Finance -->
        <div style="margin-bottom:32px;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--kec-subtle);margin-bottom:6px;">Finance Options</div>
            <div style="font-size:13px;color:var(--kec-subtle);margin-bottom:14px;">
                Total estimated project cost: <strong style="color:#e8edf2;">${fmtGBP(Math.round(c.totalProjectCost))}</strong>
                (inc. ${state.sensors ? 'sensors + ' : ''}8% project overhead)
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">

                <div class="card" style="padding:20px;">
                    <div style="font-weight:700;font-size:15px;margin-bottom:16px;">Buy Outright</div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Upfront cost</span>
                        <span style="font-weight:700;font-size:16px;">${fmtGBP(Math.round(c.totalProjectCost))}</span>
                    </div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Payback period</span>
                        <span style="font-weight:700;font-size:16px;">${c.paybackDisplay}</span>
                    </div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Net benefit (${state.roiYears}y, 3% escalation)</span>
                        <span style="font-weight:700;font-size:16px;color:${c.netBenefit >= 0 ? 'var(--kec-green)' : '#ef4444'};">${fmtGBP(Math.round(c.netBenefit))}</span>
                    </div>
                    <div class="finance-row" style="border-bottom:none;">
                        <span style="font-size:13px;color:var(--kec-subtle);">ROI (${state.roiYears}y, escalated)</span>
                        <span style="font-weight:700;font-size:16px;color:${c.roiPct >= 0 ? 'var(--kec-green)' : '#ef4444'};">${fmt(c.roiPct, 0)}%</span>
                    </div>
                </div>

                <div class="card" style="padding:20px;">
                    <div style="font-weight:700;font-size:15px;margin-bottom:16px;">Finance Lease</div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Monthly payment</span>
                        <span style="font-weight:700;font-size:16px;">${fmtGBP(c.leaseMonthly, 0)}</span>
                    </div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Upfront cost</span>
                        <span style="font-weight:700;font-size:16px;">£0</span>
                    </div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Monthly net saving</span>
                        <span style="font-weight:700;font-size:16px;color:${c.leaseMonthlySaving >= 0 ? 'var(--kec-green)' : '#ef4444'};">${fmtGBP(c.leaseMonthlySaving, 0)}</span>
                    </div>
                    <div class="finance-row" style="border-bottom:none;">
                        <span style="font-size:13px;color:var(--kec-subtle);">Lease term</span>
                        <span style="font-weight:700;font-size:16px;">${state.roiYears} years</span>
                    </div>
                </div>

                <div class="card-recommended" style="padding:20px;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
                        <div style="font-weight:700;font-size:15px;">Energy as a Service</div>
                        <span class="badge">Recommended</span>
                    </div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Monthly fee</span>
                        <span style="font-weight:700;font-size:16px;">${fmtGBP(c.eaasMonthly, 0)}</span>
                    </div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Upfront cost</span>
                        <span style="font-weight:700;font-size:16px;">£0</span>
                    </div>
                    <div class="finance-row">
                        <span style="font-size:13px;color:var(--kec-subtle);">Saving vs current</span>
                        <span style="font-weight:700;font-size:16px;color:var(--kec-green);">${fmtGBP(c.eaasMonthlySaving, 0)} / mo</span>
                    </div>
                    <div class="finance-row" style="border-bottom:none;">
                        <span style="font-size:13px;color:var(--kec-subtle);">Saving vs current (${state.roiYears}y)</span>
                        <span style="font-weight:700;font-size:16px;color:var(--kec-green);">${fmtGBP(Math.round(c.eaasMonthlySaving * 12 * state.roiYears))}</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notes -->
        <div class="note-box" style="margin-bottom:24px;">
            <strong style="color:#e8edf2;">Assumptions: </strong>
            Electricity at ${c.pencePerKwh}p/kWh rising at 3% per year · ${fmt(c.totalBulbs)} ${LIGHTING_SPECS[state.lightType].label} fittings at ${fmtGBP(c.costPerFitting)}/fitting
            ${state.sensors ? ' + sensors (£30/fitting, ~15% usage reduction)' : ''} · 8% project overhead included ·
            Savings and ROI figures reflect compounding energy price escalation over ${state.roiYears} years ·
            Finance lease based on ${state.roiYears}-year term · EaaS fee = 25% less than current monthly lighting spend ·
            This is an indicative estimate only.
        </div>

        <div style="display:flex;gap:10px;">
            <button class="btn-secondary" id="backToHours" style="flex:1;">${icons.chevronLeft} Back</button>
            <button class="btn-secondary" id="startOver" style="flex:1;">${icons.refresh} Start Over</button>
        </div>
    </div>`;
}

// ── Render & bind ────────────────────────────────────────
function render() {
    const app = document.getElementById('app');
    if (state.step === 'setup')   app.innerHTML = renderSetup();
    if (state.step === 'hours')   app.innerHTML = renderHours();
    if (state.step === 'results') app.innerHTML = renderResults();
    bindEvents();
}

function bindEvents() {
    // Setup
    const el = id => document.getElementById(id);

    if (state.step === 'setup') {
        el('buildingType')?.addEventListener('change', e => { state.buildingType = e.target.value; render(); });
        el('costOverride')?.addEventListener('input', e => { state.costOverride = e.target.value; render(); });
        el('lightType')?.addEventListener('change', e => { state.lightType = e.target.value; render(); });
        el('electricityRate')?.addEventListener('input', e => { state.electricityRate = e.target.value; render(); });
        el('sensorsToggle')?.addEventListener('click', () => { state.sensors = !state.sensors; render(); });
        el('modeDetailed')?.addEventListener('click', () => { state.quickMode = false; render(); });
        el('modeQuick')?.addEventListener('click', () => { state.quickMode = true; render(); });
        el('addRoom')?.addEventListener('click', () => { state.rooms.push({ id: uid(), name: '', bulbs: '' }); render(); });
        el('nextToHours')?.addEventListener('click', () => { state.step = 'hours'; render(); });
        el('quickRooms')?.addEventListener('input', e => { state.quickRooms = e.target.value; render(); });
        el('quickBulbs')?.addEventListener('input', e => { state.quickBulbs = e.target.value; render(); });

        document.querySelectorAll('.room-name').forEach(inp => {
            inp.addEventListener('input', e => {
                const room = state.rooms.find(r => r.id === e.target.dataset.id);
                if (room) { room.name = e.target.value; }
                // No full re-render — just update state silently
            });
        });
        document.querySelectorAll('.room-bulbs').forEach(inp => {
            inp.addEventListener('input', e => {
                const room = state.rooms.find(r => r.id === e.target.dataset.id);
                if (room) { room.bulbs = e.target.value; render(); }
            });
        });
        document.querySelectorAll('.remove-room').forEach(btn => {
            btn.addEventListener('click', e => {
                const id = e.currentTarget.dataset.id;
                state.rooms = state.rooms.filter(r => r.id !== id);
                render();
            });
        });
    }

    if (state.step === 'hours') {
        el('backToSetup')?.addEventListener('click', () => { state.step = 'setup'; render(); });
        el('nextToResults')?.addEventListener('click', () => { state.step = 'results'; render(); });
        document.querySelectorAll('.day-toggle').forEach(btn => {
            btn.addEventListener('click', e => {
                const day = e.currentTarget.dataset.day;
                state.hours[day].on = !state.hours[day].on;
                render();
            });
        });
        document.querySelectorAll('.hour-start').forEach(inp => {
            inp.addEventListener('change', e => {
                state.hours[e.target.dataset.day].start = e.target.value;
                render();
            });
        });
        document.querySelectorAll('.hour-end').forEach(inp => {
            inp.addEventListener('change', e => {
                state.hours[e.target.dataset.day].end = e.target.value;
                render();
            });
        });
        document.querySelectorAll('.roi-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                state.roiYears = parseInt(e.currentTarget.dataset.years);
                render();
            });
        });
    }

    if (state.step === 'results') {
        el('backToHours')?.addEventListener('click', () => { state.step = 'hours'; render(); });
        el('startOver')?.addEventListener('click', () => {
            state.step = 'setup';
            state.rooms = [];
            state.quickRooms = '';
            state.quickBulbs = '';
            state.costOverride = '';
            render();
        });
    }
}

// ── Boot ─────────────────────────────────────────────────
render();
</script>
</body>
</html>
